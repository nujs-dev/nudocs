# yaml-language-server: $schema=https://unpkg.com/nudocs/schema/config.json

name: "NuDocs"
shortDescription: "Docs, made easy."
description: "Elegant documentation tooling for NuJS ecosystem."
github: "nujs-dev/nudocs"
themeColor: lime
socials:
  x: "https://x.com/nujsdev"
  bluesky: "https://bsky.app/profile/nujs.dev"
  discord: "#"
# sponsors:
#   api: https://sponsors.pi0.io/sponsors.json
url: "https://nudocs.deno.dev"
# redirects:
#   "/guide": "/docs"
automd: true
landing:
  heroLinks:
    primary:
      icon: "i-heroicons-rocket-launch"
      to: "docs/quick-start"
  heroCode: "npm create nudocs@latest docs"
  contributors: true
  features:
    - title: "Easy to use"
      icon: "⚡"
      description: "Focus on writing your *documentation* with Markdown, not tooling."
    - title: "Nuxt powered"
      icon: "logos:nuxt-icon"
      description: "Made with [Nuxt](https://nuxt.com), [Nuxt Content](https://content.nuxt.com), and [Nuxt UI](https://ui.nuxt.com)."
    - title: "Deploy anywhere"
      icon: "✨"
      description: "The documentation can be hosted on any static hosting."
