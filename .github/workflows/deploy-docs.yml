name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-docs.yml"
      - "app/**"
      - "cli/**"
      - "docs/**"
      - "schema/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
  workflow_dispatch:

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Validate deploy configuration
        env:
          DENO_DEPLOY_PROJECT: ${{ vars.DENO_DEPLOY_PROJECT }}
        run: |
          test -n "$DENO_DEPLOY_PROJECT" || {
            echo "Missing repository variable: DENO_DEPLOY_PROJECT" >&2
            exit 1
          }

      - run: npm i -fg corepack && corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm run docs:build

      - name: Deploy to Deno Deploy
        uses: denoland/deployctl@v1
        with:
          project: ${{ vars.DENO_DEPLOY_PROJECT }}
          entrypoint: https://raw.githubusercontent.com/tint/deploy-endpoints/refs/heads/main/deno-nudocs-server.ts
          root: docs/.output/public
